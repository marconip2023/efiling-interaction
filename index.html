<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPSC eFiling Prototype</title>
  
  <!-- 1. 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. 載入 React 核心 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 3. 載入 Babel (用嚟喺瀏覽器即時翻譯 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 自訂 Scrollbar 樣式 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-100 overflow-hidden">
  
  <!-- React App 將會 Render 喺呢度 -->
  <div id="root"></div>

  <!-- 注意 script type 必須係 text/babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 替換 lucide-react 的原生 SVG Icons ---
    const Icons = {
      Bot: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="14" x="3" y="8" rx="2"/><path d="M12 5a3 3 0 1 0-3 3"/><path d="M9 8h6"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>,
      FileText: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Search: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>,
      Layout: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>,
      Check: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      AlertCircle: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
      Save: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
      X: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>,
      ChevronDown: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      ChevronRight: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      Zap: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      ArrowRight: ({className}) => <svg className={className||"w-4 h-4"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    };
    
    // 解構 Icons 等陣使用
    const { Bot, FileText, Search, Layout, Check, AlertCircle, Save, X, ChevronDown, ChevronRight, Zap, ArrowRight } = Icons;

    // ==========================================
    // 主程式 (Main Application)
    // ==========================================
    function CpscEfilingApp() {
      // --- State Management ---
      const [highlightSection, setHighlightSection] = useState(null);

      const [selections, setSelections] = useState({
        productName: 'qmas',
        modelNumber: 'ai',
        manufacturer: 'ai',
        description: 'ai',
        color: 'ai',
        citations: 'ai'
      });

      const [formData, setFormData] = useState({
        productName: "Microfiber Living Room Chair",
        tradeName: "Microfiber Living Room Chair",
        modelNumber: "79146934A",
        manufacturer: "Ganzhou Monikou Technology Co., Ltd.",
        description: "Microfiber Living Room Chair (Blue)",
        color: "Blue",
        poc: "CPSC Point of Contact",
        productIDType: "SKU",
        productID: "4200",
        citations: ["CPSIA (15 USC 1278a) - Lead", "16 CFR Part 1501"]
      });

      const [showSnackBar, setShowSnackBar] = useState(true);

      // --- Highlight 與 Scroll 狀態管理 ---
      const [highlightedField, setHighlightedField] = useState(null);
      const timeoutRef = useRef(null);
      const fieldRefs = useRef({});

      const setFieldRef = (fieldKey) => (element) => {
        fieldRefs.current[fieldKey] = element;
      };

      // 數據源 Mock Data
      const dataSources = {
        productName: {
          qmas: "Microfiber Living Room Chair",
          ai: "Microfiber Living Room Chairaaaa (Bf..."
        },
        manufacturer: {
          qmas: "Global Furniture Ltd.",
          ai: "Ganzhou Monikou Technology Co., Ltd."
        },
        description: {
          qmas: "Microfiber Chair",
          ai: "Microfiber Living Room Chair is a toy f..."
        },
        color: {
          qmas: null,
          ai: "Blue"
        },
        citations: {
          qmas: [""], // 模擬 Backend 傳來空字串的 Bug 數據
          ai: ["CPSIA (15 USC 1278a) - Lead", "16 CFR Part 1501"]
        }
      };

      // --- Handlers ---
      const handleSelectionChange = (field, source) => {
        setSelections(prev => ({ ...prev, [field]: source }));
        
        const newValue = dataSources[field][source];
        setFormData(prev => ({ ...prev, [field]: newValue }));

        setHighlightSection(field);

        if (timeoutRef.current) clearTimeout(timeoutRef.current);
        
        setHighlightedField(field);

        if (fieldRefs.current[field]) {
          fieldRefs.current[field].scrollIntoView({ 
            behavior: 'smooth', 
            block: 'center' 
          });
        }

        timeoutRef.current = setTimeout(() => {
          setHighlightedField(null);
        }, 1000);
      };

      const handleFormChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
      };

      // --- Components Render ---
      return (
        <div className="flex flex-col h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden">
          
          {/* Top Navigation */}
          <header className="h-14 bg-white border-b flex items-center justify-between px-6 shrink-0 z-20">
            <div className="flex items-center gap-2">
               <div className="bg-blue-600 p-1.5 rounded-lg">
                 <Bot className="w-5 h-5 text-white" />
               </div>
               <h1 className="font-bold text-lg text-slate-800">AI Data Reconciliation</h1>
            </div>
            <div className="flex gap-3">
              <button className="px-4 py-1.5 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded border">Save Draft</button>
              <button className="px-4 py-1.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded shadow-sm">Submit</button>
            </div>
          </header>
          
          {showSnackBar && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-4 animate-in duration-500" style={{animation: 'slideUp 0.5s ease-out'}}>
              <div className="flex items-center gap-2">
                <Zap className="w-4 h-4 text-yellow-400 fill-yellow-400" />
                <span className="text-sm">AI has auto-filled <strong>5 fields</strong>. Please review highlighted items.</span>
              </div>
              <button onClick={() => setShowSnackBar(false)} className="text-slate-400 hover:text-white"><X className="w-4 h-4"/></button>
            </div>
          )}

          {/* Main Layout: 3 Columns */}
          <div className="flex-1 flex overflow-hidden">
            
            {/* --- LEFT COLUMN: Document Preview --- */}
            <div className="w-[28%] bg-slate-200/50 border-r border-slate-300 flex flex-col">
              <div className="p-3 bg-white border-b flex justify-between items-center text-xs text-slate-500">
                 <div className="flex items-center gap-2">
                   <FileText className="w-4 h-4" />
                   <span>CPC_form.pdf (Page 1/3)</span>
                 </div>
                 <div className="flex gap-2">
                    <Search className="w-4 h-4" />
                 </div>
              </div>
              
              <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                <div className="bg-white shadow-lg min-h-[800px] p-8 text-[10px] leading-relaxed relative select-none">
                   <div className="text-center font-bold text-base mb-6 border-b pb-4">CHILDREN'S PRODUCT CERTIFICATE</div>
                   
                   <div className="mb-4">
                     <div className="font-bold text-slate-400 mb-1">1. Identification of the product covered by this certificate:</div>
                     <div className={`transition-all duration-300 p-1 rounded border-2 ${highlightSection === 'productName' || highlightSection === 'description' || highlightSection === 'color' ? 'bg-yellow-100 border-yellow-400' : 'border-transparent'}`}>
                       Microfiber Living Room Chair (Blue Edition). Model 79146934A.
                     </div>
                   </div>

                   <div className="mb-4">
                     <div className="font-bold text-slate-400 mb-1">2. Citation to each CPSC product safety regulation:</div>
                     <div className={`transition-all duration-300 pl-2 border-l-2 ${highlightSection === 'citations' ? 'border-yellow-400 bg-yellow-100' : 'border-slate-200'}`}>
                       16 CFR Part 1500.3(c)(6)(vi)<br/>
                       ASTM F963-17
                     </div>
                   </div>

                   <div className="mb-4">
                     <div className="font-bold text-slate-400 mb-1">3. Identification of the importer or domestic manufacturer:</div>
                     <div className={`transition-all duration-300 p-1 rounded border-2 ${highlightSection === 'manufacturer' ? 'bg-yellow-100 border-yellow-400' : 'border-transparent'}`}>
                       Ganzhou Monikou Technology Co., Ltd.<br/>
                       Industrial Park, Ganzhou District<br/>
                       Jiangxi Province, China
                     </div>
                   </div>

                   <div className="mb-4">
                     <div className="font-bold text-slate-400 mb-1">4. Contact information for the individual maintaining records:</div>
                     <div>
                       Amy Wong (amy.wong@gmt.com)<br/>
                       +86 33567945
                     </div>
                   </div>
                   
                   <div className="mb-4">
                     <div className="font-bold text-slate-400 mb-1">5. Date and place where this product was manufactured:</div>
                     <div className="p-1">
                       May 2023, Ganzhou, China
                     </div>
                   </div>
                   
                   {highlightSection && (
                     <div className="absolute top-2 right-2 bg-blue-600 text-white text-[9px] px-2 py-1 rounded shadow animate-pulse">
                       Viewing Context
                     </div>
                   )}
                </div>
              </div>
            </div>

            {/* --- MIDDLE COLUMN: AI Extracted Data Select --- */}
            <div className="w-[30%] bg-white border-r border-slate-200 flex flex-col z-10 shadow-xl">
              <div className="p-4 bg-slate-900 text-white flex justify-between items-center shrink-0">
                 <div>
                   <h2 className="font-bold text-sm">AI Extracted Data Select</h2>
                   <p className="text-[10px] text-slate-400">Review conflicts to auto-fill form</p>
                 </div>
                 <Layout className="w-4 h-4 text-slate-400" />
              </div>

              <div className="flex-1 overflow-y-auto p-2 bg-slate-50 custom-scrollbar">
                <Section title="Product Detail" defaultOpen={true}>
                  <ConflictGroup 
                    label="Product Name" 
                    field="productName"
                    currentSource={selections.productName}
                    onSelect={handleSelectionChange}
                    options={[
                      { source: 'qmas', value: dataSources.productName.qmas },
                      { source: 'ai', value: dataSources.productName.ai }
                    ]}
                  />

                  <ConflictGroup 
                    label="Manufacturer" 
                    field="manufacturer"
                    currentSource={selections.manufacturer}
                    onSelect={handleSelectionChange}
                    options={[
                      { source: 'qmas', value: dataSources.manufacturer.qmas },
                      { source: 'ai', value: dataSources.manufacturer.ai }
                    ]}
                  />

                   <ConflictGroup 
                    label="Description" 
                    field="description"
                    currentSource={selections.description}
                    onSelect={handleSelectionChange}
                    options={[
                      { source: 'qmas', value: dataSources.description.qmas },
                      { source: 'ai', value: dataSources.description.ai }
                    ]}
                  />

                   <div className="mt-4 p-3 bg-red-50 rounded-lg border border-red-100">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-xs font-bold text-slate-700">Color</span>
                        <span className="text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold">Missing in System</span>
                      </div>
                      <div className="space-y-2">
                         <div className="flex items-start gap-2 opacity-50 cursor-not-allowed">
                            <div className="w-4 h-4 rounded-full border border-slate-300 mt-0.5"></div>
                            <div className="flex-1 text-xs text-slate-400 italic">No data in QMAS</div>
                         </div>
                         <div 
                            onClick={() => handleSelectionChange('color', 'ai')}
                            className={`flex items-start gap-2 cursor-pointer p-2 rounded border transition-all ${selections.color === 'ai' ? 'bg-blue-50 border-blue-500 shadow-sm' : 'bg-white border-slate-200'}`}
                          >
                            <div className={`w-4 h-4 rounded-full border flex items-center justify-center ${selections.color === 'ai' ? 'border-blue-500' : 'border-slate-300'}`}>
                               {selections.color === 'ai' && <div className="w-2 h-2 rounded-full bg-blue-500"></div>}
                            </div>
                            <div className="flex-1 min-w-0">
                               <div className="flex justify-between items-start">
                                 <div className={`text-xs ${selections.color === 'ai' ? 'font-bold text-slate-900' : 'font-medium text-slate-800'}`}>{dataSources.color.ai}</div>
                                 <Badge type="ai" />
                               </div>
                               {selections.color === 'ai' && (
                                 <div className="text-[9px] text-slate-400 mt-1 flex items-center gap-1">
                                   <ArrowRight className="w-3 h-3" /> Auto-filling form...
                                 </div>
                               )}
                            </div>
                         </div>
                      </div>
                   </div>
                </Section>

                <Section title="Lab (3)" defaultOpen={true}>
                   <ConflictGroup 
                    label="Citations Under This Lab" 
                    field="citations"
                    currentSource={selections.citations}
                    onSelect={handleSelectionChange}
                    options={[
                      { source: 'qmas', value: "No citations (Trigger Empty Bug Test)" },
                      { source: 'ai', value: "CPSIA (15 USC 1278a) & 1 more" }
                    ]}
                  />
                </Section>
              </div>
            </div>

            {/* --- RIGHT COLUMN: Final Submission Form --- */}
            <div className="w-[42%] bg-white flex flex-col">
              <div className="p-4 bg-slate-900 text-white shrink-0">
                 <h2 className="font-bold text-sm flex items-center gap-2">
                   <ArrowRight className="w-4 h-4" /> Final eFiling Submission Form
                 </h2>
                 <p className="text-[10px] text-slate-400">Fill eFiling item (Auto-filled from selection)</p>
              </div>

              <div className="bg-blue-50 border-b border-blue-100 p-3 flex items-start gap-3 shrink-0">
                 <Bot className="w-5 h-5 text-blue-600 mt-0.5 shrink-0" />
                 <div className="flex-1">
                   <h3 className="text-xs font-bold text-blue-800">AI Data Applied</h3>
                   <p className="text-[10px] text-blue-600 leading-tight mt-0.5">
                     Fields marked with <span className="inline-flex items-center gap-0.5 bg-blue-100 text-blue-700 px-1 rounded mx-0.5"><Bot className="w-2 h-2"/> AI Filled</span> have been populated from the PDF. Please verify accuracy before submitting.
                   </p>
                 </div>
              </div>
              
              <div className="flex-1 overflow-y-auto p-6 bg-slate-50 space-y-6 custom-scrollbar scroll-smooth">
                 
                 {/* Section 1 */}
                 <div className="bg-white p-4 rounded-lg border shadow-sm">
                    <h3 className="text-sm font-bold text-slate-800 mb-4 border-b pb-2">1. eFiling Information</h3>
                    
                    <div className="mb-4">
                       <div className="flex justify-between mb-1">
                          <label className="text-xs font-bold text-slate-500">Point of Contact <span className="text-red-500">*</span></label>
                       </div>
                       <div className="flex gap-4 mb-2">
                          <label className="flex items-center gap-2 text-xs cursor-pointer">
                            <input 
                              type="radio" 
                              name="poc" 
                              value="CPSC Point of Contact"
                              checked={formData.poc === 'CPSC Point of Contact'}
                              onChange={(e) => handleFormChange('poc', e.target.value)}
                              className="text-blue-600" 
                            /> 
                            <span className="font-medium text-slate-700">CPSC Point of Contact</span>
                          </label>
                          <label className="flex items-center gap-2 text-xs cursor-pointer">
                            <input 
                              type="radio" 
                              name="poc" 
                              value="New Point of Contact"
                              checked={formData.poc === 'New Point of Contact'}
                              onChange={(e) => handleFormChange('poc', e.target.value)}
                              className="text-blue-600" 
                            /> 
                            <span className="text-slate-500">New Point of Contact</span>
                          </label>
                       </div>
                       <select className="w-full text-sm border border-slate-300 rounded p-2 bg-slate-50 text-slate-700">
                         <option>Importer (Default)</option>
                       </select>
                    </div>
                 </div>

                 {/* Section 2 */}
                 <div className="bg-white p-4 rounded-lg border shadow-sm">
                    <h3 className="text-sm font-bold text-slate-800 mb-4 border-b pb-2 flex justify-between">
                       2. Product Detail
                       <ChevronDown className="w-4 h-4 text-slate-400"/>
                    </h3>

                    <InputField 
                      label="Product Name" 
                      value={formData.productName} 
                      required 
                      isAiFilled={selections.productName === 'ai'}
                      fieldRef={setFieldRef('productName')}
                      isHighlighted={highlightedField === 'productName'}
                    />

                    <InputField 
                      label="Manufacturer" 
                      value={formData.manufacturer} 
                      required 
                      isAiFilled={selections.manufacturer === 'ai'}
                      fieldRef={setFieldRef('manufacturer')}
                      isHighlighted={highlightedField === 'manufacturer'}
                    />
                 </div>

                 {/* Section 3 - Description */}
                 <div className="bg-white p-4 rounded-lg border shadow-sm">
                     <h3 className="text-sm font-bold text-slate-800 mb-4 border-b pb-2 flex justify-between">
                       Product Description
                       <ChevronDown className="w-4 h-4 text-slate-400"/>
                    </h3>

                    <InputField 
                      label="Color" 
                      value={formData.color || ""} 
                      isAiFilled={selections.color === 'ai'}
                      className={selections.color === 'ai' ? "border-blue-500 ring-1 ring-blue-200 bg-blue-50/20" : ""}
                      fieldRef={setFieldRef('color')}
                      isHighlighted={highlightedField === 'color'}
                    />
                 </div>

                 {/* E-filing Citation Section */}
                 <div 
                   ref={setFieldRef('citations')}
                   className={`p-4 rounded-xl transition-all duration-700 ease-out border-2 bg-white scroll-mt-24
                     ${highlightedField === 'citations' ? 'border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] bg-blue-50/30' : 'border-slate-300 shadow-sm'}
                   `}
                 >
                   <div className="flex justify-between items-center mb-4 border-b pb-2">
                      <h3 className="font-bold text-sm text-slate-700 flex items-center gap-2">
                        E-filing Citation ({formData.citations?.filter(Boolean).length || 0})
                        <span className={`text-[10px] text-blue-500 transition-opacity duration-300 ${highlightedField === 'citations' ? 'opacity-100' : 'opacity-0'}`}>
                          Auto-filled!
                        </span>
                      </h3>
                      <span className="text-xs text-blue-500 cursor-pointer">View Compliance Data</span>
                   </div>
                   <div className="flex flex-wrap gap-2 min-h-[40px]">
                      {formData.citations?.filter(Boolean).map((cit, i) => (
                        <span key={i} className="bg-slate-100 border border-slate-300 px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1 shadow-sm">
                          {cit} 
                          <button className="w-4 h-4 bg-slate-300 hover:bg-red-400 text-white rounded-full inline-flex items-center justify-center text-[10px] ml-1 transition-colors">
                            <X className="w-3 h-3" />
                          </button>
                        </span>
                      ))}

                      {(!formData.citations || formData.citations.filter(Boolean).length === 0) && (
                        <span className="text-sm text-slate-400 italic flex items-center h-full">No citations selected</span>
                      )}
                   </div>
                 </div>
                 
                 <div className="h-64 flex items-center justify-center border-2 border-dashed border-slate-300 rounded-xl text-slate-400">
                   [ Form End ]
                 </div>

              </div>
            </div>

          </div>
        </div>
      );
    }

    // ==========================================
    // 子元件 (Sub Components)
    // ==========================================
    function Section({ title, defaultOpen, children }) {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div className="mb-2 bg-white rounded border border-slate-200 shadow-sm overflow-hidden">
          <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between p-3 bg-slate-50 hover:bg-slate-100 transition-colors">
            <span className="font-bold text-xs text-slate-800">{title}</span>
            {open ? <ChevronDown className="w-4 h-4 text-slate-400"/> : <ChevronRight className="w-4 h-4 text-slate-400"/>}
          </button>
          {open && <div className="p-3 border-t border-slate-100">{children}</div>}
        </div>
      );
    }

    function ConflictGroup({ label, field, currentSource, onSelect, options }) {
      return (
        <div className="mb-4 last:mb-0">
          <div className="text-xs font-bold text-slate-700 mb-2">{label}</div>
          <div className="space-y-2">
            {options.map((opt, idx) => (
               <label 
                 key={idx}
                 onClick={() => onSelect(field, opt.source)}
                 className={`
                   relative flex items-start gap-3 p-2 rounded border cursor-pointer transition-all
                   ${currentSource === opt.source 
                     ? (opt.source === 'ai' ? 'bg-blue-50 border-blue-500 shadow-sm' : 'bg-purple-50 border-purple-500 shadow-sm') 
                     : 'bg-white border-slate-200 hover:border-slate-300'}
                 `}
               >
                 <div className="mt-0.5">
                   <div className={`w-4 h-4 rounded-full border flex items-center justify-center ${currentSource === opt.source ? (opt.source === 'ai' ? 'border-blue-500' : 'border-purple-500') : 'border-slate-300'}`}>
                      {currentSource === opt.source && <div className={`w-2 h-2 rounded-full ${opt.source === 'ai' ? 'bg-blue-500' : 'bg-purple-500'}`}></div>}
                   </div>
                 </div>
                 <div className="flex-1 min-w-0">
                   <div className="flex justify-between items-start">
                      <span className={`text-xs block truncate pr-2 ${currentSource === opt.source ? 'font-bold text-slate-900' : 'text-slate-600'}`}>
                        {opt.value}
                      </span>
                      <Badge type={opt.source} />
                   </div>
                   {currentSource === opt.source && (
                     <div className="text-[9px] text-slate-400 mt-1 flex items-center gap-1">
                       <ArrowRight className="w-3 h-3" /> Auto-filling form & scrolling...
                     </div>
                   )}
                 </div>
               </label>
            ))}
          </div>
        </div>
      );
    }

    function Badge({ type }) {
      if (type === 'qmas') {
        return <span className="text-[9px] font-bold bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded border border-purple-200 shrink-0">QMAS</span>;
      }
      return <span className="text-[9px] font-bold bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded border border-blue-200 shrink-0 flex items-center gap-0.5"><Bot className="w-2 h-2"/> AI</span>;
    }

    function InputField({ label, value, required, note, isAiFilled, className = "", fieldRef, isHighlighted }) {
      return (
        <div 
          ref={fieldRef}
          className={`relative group scroll-mt-24 p-2 -mx-2 rounded outline outline-offset-2 transition-all duration-700 ease-out mb-2
            ${isHighlighted ? 'outline-blue-500 outline-2 bg-blue-50/30' : 'outline-transparent outline-0'}
          `}
        >
          <div className="flex justify-between mb-1">
             <label className="text-xs font-bold text-slate-500 flex items-center gap-2">
               {label} {required && <span className="text-red-500">*</span>}
               <span className={`text-[10px] text-blue-500 transition-opacity duration-300 ${isHighlighted ? 'opacity-100' : 'opacity-0'}`}>
                 Auto-filled!
               </span>
             </label>
             {isAiFilled && <AiBadge />}
          </div>
          <div className="relative">
            <input 
              type="text" 
              value={value}
              readOnly
              className={`w-full text-sm border rounded p-2 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-colors 
                ${isAiFilled ? 'border-blue-300' : 'border-slate-300'}
                ${className}
              `}
            />
            {required && !value && (
               <AlertCircle className="w-4 h-4 text-red-500 absolute right-2 top-2.5" />
            )}
          </div>
          {note && (
            <div className="flex items-center gap-1 mt-1 text-[10px] text-slate-400">
              <AlertCircle className="w-3 h-3" /> {note}
            </div>
          )}
        </div>
      );
    }

    function AiBadge() {
      return (
        <div className="flex items-center gap-0.5 bg-blue-100 text-blue-600 px-1.5 rounded text-[9px] font-bold border border-blue-200 shadow-sm animate-pulse">
           <Bot className="w-2 h-2" /> AI Filled
        </div>
      );
    }

    // 將 App 渲染到畫面上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CpscEfilingApp />);
  </script>
</body>
</html>
